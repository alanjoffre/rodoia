name: Reproduzir métrica-âncora

# REPRODUÇÃO REAL (diferente do gate do ci.yml, que só lê o JSON commitado): baixa o corpus
# público, reconstrói o índice e RE-EXECUTA o retrieval, falhando se o hit@5 divergir do report
# versionado. Fecha o ataque "seu CI não reproduz nada". A âncora é CPU-determinística, então roda
# no runner GITHUB-HOSTED (sem esconder atrás de GPU) — depende apenas da fonte pública da ANTT
# estar acessível no momento do scrape (por isso não fica no ci.yml de cada push: é lento e
# depende de rede externa).

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"        # semanal (segunda, 06:00 UTC)

jobs:
  reproduzir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar (.[rag,estruturados] — E5/Qdrant/BM25 + DuckDB, CPU)
        run: pip install -e ".[rag,estruturados]"

      - name: Âncora 1 — corpus público + índice (retrieval)
        run: |
          python -m rodoia.rag.baixar_normas
          python -m rodoia.rag.construir_indice

      - name: Âncora 2 — volume + DuckDB (previsão; tolerante a CKAN fora do ar)
        run: |
          python -m rodoia.data.baixar_volume \
            && python -m rodoia.data.ingestao_volume \
            && python -m rodoia.dados.estrela \
            || echo "volume indisponível — a âncora de previsão pulará (sem falhar)"

      - name: Reproduzir as âncoras (re-executa o pipeline e confere; grava evidência)
        run: python -m rodoia.mlops.reproduzir

      - name: Publicar a evidência da reprodução
        uses: actions/upload-artifact@v4
        with:
          name: reproducao
          path: reports/fase1_retrieval/reproducao.json
