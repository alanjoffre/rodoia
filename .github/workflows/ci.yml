name: CI

# Lint + testes + GATE de avaliação (regressão de métrica falha o pipeline).
# Roda em CPU: os testes de fundamentos que exigem PyTorch são pulados na coleta
# (tests/conftest.py) — validados localmente na Nitro. Todo o resto roda aqui.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qualidade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # Instalação REPRODUTÍVEL a partir do lockfile com hash de conteúdo. Fixa a árvore resolvida
      # (numpy, mypy, ruff, ...) para que o CI não derive silenciosamente para uma versão nova — foi
      # exatamente uma dessas derivas (numpy 2.3.5 local vs 2.5.1 no CI) que quebrou o portão do mypy.
      # O pacote do projeto entra à parte (--no-deps: as deps já vêm pinadas do lock).
      - name: Instalar dependências (do lockfile, com hash)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-ci.lock
          pip install -e . --no-deps

      - name: Lint (ruff)
        run: ruff check .

      # Contrato de tipos do NÚCLEO SERVIDO (API/RAG/agente/guardrails/gate). Os scripts de
      # pesquisa/treino ficam fora por override no pyproject — a fronteira está declarada lá,
      # não escondida aqui. Portão BLOQUEANTE: antes o mypy só existia no pyproject e nunca
      # rodava, o que deixou 300 erros acumularem sob um `strict = true` decorativo.
      - name: Tipos (mypy — núcleo servido)
        run: mypy src

      - name: Testes (pytest)
        run: pytest -q

      - name: Gate de avaliação (regressão de métrica reprova)
        run: python -m rodoia.mlops.gate

  # Job isolado (não polui o ambiente de teste): audita o lockfile contra CVEs conhecidas.
  dependencias:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Auditoria de dependências (pip-audit — CVEs conhecidas)
        run: |
          pip install pip-audit
          pip-audit -r requirements-ci.lock
