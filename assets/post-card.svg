<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="RodoIA — Engenharia de IA de ponta a ponta">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111a2e"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glowV" cx="0.12" cy="0.08" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0.9" cy="0.95" r="0.55">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glowV)"/>
  <rect width="1200" height="1200" fill="url(#glowC)"/>
  <rect x="18" y="18" width="1164" height="1164" rx="28" fill="none" stroke="#2a3550" stroke-width="1.5"/>

  <!-- header -->
  <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="-1" fill="url(#ink)">RodoIA</text>
  <text x="600" y="205" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#e6ecf7">Engenharia de IA de ponta a ponta</text>
  <text x="600" y="243" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" font-weight="500" fill="#8b97ad">do backprop &#224; m&#227;o ao serving em produ&#231;&#227;o &#183; dados p&#250;blicos da ANTT</text>

  <line x1="360" y1="286" x2="840" y2="286" stroke="url(#ink)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- phases -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <g><circle cx="212" cy="352" r="19" fill="#0d1117" stroke="#22d3ee" stroke-width="2"/><text x="212" y="359" text-anchor="middle" font-size="20" font-weight="700" fill="#67e8f9">0</text><text x="252" y="360" font-size="25" font-weight="600" fill="#dbe3f0">Fundamentos &#8212; backprop e self-attention &#224; m&#227;o</text></g>
    <g><circle cx="212" cy="418" r="19" fill="#0d1117" stroke="#22d3ee" stroke-width="2"/><text x="212" y="425" text-anchor="middle" font-size="20" font-weight="700" fill="#67e8f9">1</text><text x="252" y="426" font-size="25" font-weight="600" fill="#dbe3f0">RAG &#8212; busca h&#237;brida + cita&#231;&#227;o de fonte + guardrails</text></g>
    <g><circle cx="212" cy="484" r="19" fill="#0d1117" stroke="#818cf8" stroke-width="2"/><text x="212" y="491" text-anchor="middle" font-size="20" font-weight="700" fill="#a9b6f0">2</text><text x="252" y="492" font-size="25" font-weight="600" fill="#dbe3f0">Fine-tuning &#8212; QLoRA &#183; F1 0,13&#8594;0,77 &#183; vLLM</text></g>
    <g><circle cx="212" cy="550" r="19" fill="#0d1117" stroke="#818cf8" stroke-width="2"/><text x="212" y="557" text-anchor="middle" font-size="20" font-weight="700" fill="#a9b6f0">3</text><text x="252" y="558" font-size="25" font-weight="600" fill="#dbe3f0">Dados &#8212; DuckDB &#183; previs&#227;o que bate o baseline</text></g>
    <g><circle cx="212" cy="616" r="19" fill="#0d1117" stroke="#a78bfa" stroke-width="2"/><text x="212" y="623" text-anchor="middle" font-size="20" font-weight="700" fill="#c4b5fd">4</text><text x="252" y="624" font-size="25" font-weight="600" fill="#dbe3f0">Agente &#8212; LangGraph &#183; roteamento 0,95</text></g>
    <g><circle cx="212" cy="682" r="19" fill="#0d1117" stroke="#a78bfa" stroke-width="2"/><text x="212" y="689" text-anchor="middle" font-size="20" font-weight="700" fill="#c4b5fd">5</text><text x="252" y="690" font-size="25" font-weight="600" fill="#dbe3f0">MLOps &#8212; CI com avalia&#231;&#227;o como gate (12/12)</text></g>
  </g>

  <!-- honesty highlight -->
  <rect x="150" y="748" width="900" height="168" rx="16" fill="#12182b" stroke="#22d3ee55" stroke-width="1.5"/>
  <text x="600" y="800" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="27" font-weight="800" fill="#67e8f9">O rigor corrigiu os pr&#243;prios n&#250;meros.</text>
  <text x="600" y="843" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#d3dcec">Uma auditoria humana achou 16% dos r&#243;tulos do meu</text>
  <text x="600" y="875" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#d3dcec">benchmark errados &#8212; e eu publiquei o impacto.</text>

  <!-- metrics chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">
    <g><rect x="305" y="962" width="180" height="44" rx="10" fill="#0e1b1f" stroke="#22d3ee66"/><text x="395" y="990" fill="#67e8f9">F1 0,13&#8594;0,77</text></g>
    <g><rect x="505" y="962" width="226" height="44" rx="10" fill="#0e1b1f" stroke="#22d3ee66"/><text x="618" y="990" fill="#67e8f9">hit@5 0,70&#8211;0,76</text></g>
    <g><rect x="751" y="962" width="140" height="44" rx="10" fill="#151226" stroke="#a78bfa66"/><text x="821" y="990" fill="#c4b5fd">gate 12/12</text></g>
  </g>

  <!-- footer links -->
  <text x="600" y="1080" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#dbe3f0">github.com/alanjoffre/rodoia</text>
  <text x="600" y="1118" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#8b97ad">&#9654; demo ao vivo &#183; huggingface.co/spaces/alanjoffre/rodoia-rag</text>
</svg>
